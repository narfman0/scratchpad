<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — Scratchpad</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 860px; margin: 2rem auto; padding: 0 1rem; color: #222; }
    header { border-bottom: 1px solid #ddd; padding-bottom: 0.5rem; margin-bottom: 1.5rem; }
    header a { text-decoration: none; color: #555; font-size: 0.9rem; }
    h1 { margin: 0 0 0.25rem; }
    .meta { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
    pre { background: #f5f5f5; padding: 1rem; border-radius: 4px; overflow-x: auto; }
    code { font-family: "Fira Code", "Cascadia Code", monospace; font-size: 0.9rem; }
    .copy-btn { float: right; font-size: 0.8rem; padding: 0.2rem 0.6rem; cursor: pointer; }
  </style>
</head>
<body>
  <header><a href="{{ site.baseurl }}/">← All pastes</a></header>
  <h1>{{ page.title }}</h1>
  <div class="meta">{{ page.date | date: "%Y-%m-%d %H:%M UTC" }}{% if page.author %} · {{ page.author }}{% endif %}</div>
  <button class="copy-btn" onclick="navigator.clipboard.writeText(document.querySelector('.paste-content').innerText)">Copy</button>
  <div class="paste-content">
    {{ content }}
  </div>
  <script>document.querySelector('.copy-btn').addEventListener('click',()=>{const b=document.querySelector('.copy-btn');b.textContent='Copied!';setTimeout(()=>b.textContent='Copy',1500);});</script>
</body>
</html>
